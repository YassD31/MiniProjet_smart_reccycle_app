<!DOCTYPE html>
<html lang="fr">
<head>

    <meta charset="UTF-8">

    <title>Smart Recycling</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            text-align:center;
            padding-top:50px;
        }

        .container{
            width:600px;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 0px 15px gray;
        }

        h1{
            color:green;
        }

        input{
            margin-top:20px;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>♻ Smart Recycling AI</h1>

    <h3>Analyse intelligente des déchets</h3>

    <p>
        Cette application utilise l'intelligence artificielle pour reconnaître
        automatiquement les déchets et fournir des informations écologiques.
    </p>

    <form action="/predict" method="POST" enctype="multipart/form-data">

        <input type="file" name="image" required>

        <br>

        <button type="submit">Analyser le déchet</button>

    </form>

</div>

</body>
</html>
